name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            libglib2.0-dev \
            pkg-config \
            libssl-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-build-target-

      - name: Check types
        run: cargo check --all-targets

      - name: Test core
        run: cargo test -p ashot-core --all-features

      - name: Test cli
        run: cargo test -p ashot-cli --all-features

  flatpak-build:
    name: Flatpak Build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak-builder libgtk-3-dev libglib2.0-dev pkg-config

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable

      - name: Install Flatpak runtime
        run: |
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub \
            org.gnome.Platform//49 \
            org.gnome.Sdk//49 \
            org.freedesktop.Sdk.Extension.rust-stable//25.08

      - name: Prepare vendor directory
        run: |
          cargo vendor --locked flatpak/vendor \
            | sed 's#directory = ".*flatpak/vendor"#directory = "vendor"#' \
            >flatpak/cargo-config.toml

      - name: Build Flatpak
        run: |
          flatpak-builder \
            --user \
            --force-clean \
            --disable-rofiles-fuse \
            --install-deps-from=flathub \
            --repo=build-flatpak/repo \
            -y \
            build-flatpak \
            flatpak/io.github.ashot.App.json

      - name: Create Flatpak bundle
        run: |
          flatpak build-bundle \
            build-flatpak/repo \
            build-flatpak/io.github.ashot.App.flatpak \
            io.github.ashot.App

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-artifact
          path: build-flatpak/io.github.ashot.App.flatpak
