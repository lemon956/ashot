name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-build-target-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Check types
        run: cargo check --all-features --all-targets

      - name: Test core
        run: cargo test -p ashot-core --all-features

      - name: Test cli
        run: cargo test -p ashot-cli --all-features

  flatpak-build:
    name: Flatpak Build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install flatpak-builder
        run: sudo apt-get update && sudo apt-get install -y flatpak-builder

      - name: Install Flatpak runtime
        run: |
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.gnome.Platform//49 org.gnome.Sdk//49
          flatpak install --user -y flathub org.freedesktop.Sdk.Extension.rust-stable//stable

      - name: Prepare vendor directory
        run: |
          cargo vendor --locked flatpak/vendor \
            | sed 's#directory = ".*flatpak/vendor"#directory = "vendor"#' \
            >flatpak/cargo-config.toml

      - name: Build Flatpak
        run: |
          flatpak-builder \
            --user \
            --force-clean \
            --disable-rofiles-fuse \
            --install-deps-from=flathub \
            -y \
            build-flatpak \
            flatpak/io.github.ashot.App.json

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-artifact
          path: build-flatpak/io.github.ashot.App.flatpak