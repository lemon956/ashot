name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build Flatpak
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flatpak runtime
        run: |
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.gnome.Platform//49 org.gnome.Sdk//49
          flatpak install --user -y flathub org.freedesktop.Sdk.Extension.rust-stable//stable

      - name: Prepare vendor directory
        run: |
          cargo vendor --locked flatpak/vendor \
            | sed 's#directory = ".*flatpak/vendor"#directory = "vendor"#' \
            >flatpak/cargo-config.toml

      - name: Build Flatpak
        run: |
          flatpak-builder \
            --user \
            --force-clean \
            --disable-rofiles-fuse \
            --install-deps-from=flathub \
            -y \
            build-flatpak \
            flatpak/io.github.ashot.App.json

      - name: Prepare repo
        run: |
          mkdir -p build-flatpak/repo
          flatpak build-update-repo build-flatpak/repo

      - name: Create changelog
        run: |
          if [ -f CHANGELOG.md ]; then
            cp CHANGELOG.md /tmp/changelog.md
          else
            git log --pretty=format:"- %s" -10 > /tmp/changelog.md
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/changelog.md
          files: |
            build-flatpak/io.github.ashot.App.flatpak
            build-flatpak/repo/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}