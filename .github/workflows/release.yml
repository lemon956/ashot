name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dpkg-dev \
            flatpak-builder \
            gnome-shell \
            libadwaita-1-dev \
            libglib2.0-dev \
            libgtk-4-dev \
            libssl-dev \
            pkg-config \
            rpm

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable

      - name: Install Flatpak runtime
        run: |
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub \
            org.gnome.Platform//49 \
            org.gnome.Sdk//49 \
            org.freedesktop.Sdk.Extension.rust-stable//25.08

      - name: Prepare vendor directory
        run: |
          cargo vendor --locked flatpak/vendor \
            | sed 's#directory = ".*flatpak/vendor"#directory = "vendor"#' \
            >flatpak/cargo-config.toml

      - name: Build Flatpak
        run: |
          flatpak-builder \
            --user \
            --force-clean \
            --disable-rofiles-fuse \
            --install-deps-from=flathub \
            --repo=build-flatpak/repo \
            -y \
            build-flatpak \
            flatpak/io.github.ashot.App.json

      - name: Create Flatpak bundle
        run: |
          ASHOT_VERSION=${GITHUB_REF_NAME}
          flatpak build-bundle \
            build-flatpak/repo \
            build-flatpak/io.github.ashot.App-${ASHOT_VERSION}.flatpak \
            io.github.ashot.App

      - name: Build native release binaries
        run: |
          cargo build --release --locked -p ashot-app -p ashot-cli

      - name: Build distro packages
        run: |
          ASHOT_VERSION=${GITHUB_REF_NAME} ./scripts/build-distro-packages.sh

      - name: Build GNOME Shell extension bundle
        run: |
          mkdir -p build-packages
          gnome-extensions pack \
            -f \
            -o build-packages \
            gnome-shell/extensions/ashot-pin@io.github.ashot
          sed "s#__ASHOT_REPO__#${GITHUB_REPOSITORY}#g" \
            scripts/install-release-packages.sh \
            > build-packages/install.sh
          chmod +x build-packages/install.sh

      - name: Prepare repo
        run: |
          ASHOT_VERSION=${GITHUB_REF_NAME}
          mkdir -p build-flatpak/repo
          flatpak build-update-repo build-flatpak/repo
          tar --exclude='.lock' -C build-flatpak -czf build-flatpak/io.github.ashot.App-${ASHOT_VERSION}.repo.tar.gz repo

      - name: Create changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          : > /tmp/changelog.md
          if [ -f CHANGELOG.md ]; then
            # Extract only this version's section (from "## [VERSION]" up to the
            # next "## [" heading) so the release notes do not include the whole
            # file or the "[Unreleased]" block.
            awk -v target="## [${VERSION}]" '
              index($0, target) == 1 { capture = 1; next }
              capture && /^## \[/ { exit }
              capture { print }
            ' CHANGELOG.md > /tmp/changelog.md
          fi
          if [ ! -s /tmp/changelog.md ]; then
            git log --pretty=format:"- %s" -10 > /tmp/changelog.md
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/changelog.md
          files: |
            build-flatpak/io.github.ashot.App-${{ github.ref_name }}.flatpak
            build-flatpak/io.github.ashot.App-${{ github.ref_name }}.repo.tar.gz
            build-packages/*.deb
            build-packages/*.rpm
            build-packages/*.shell-extension.zip
            build-packages/install.sh
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
