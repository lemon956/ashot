name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build Flatpak
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Install flatpak-builder
        run: sudo apt-get update && sudo apt-get install -y flatpak-builder

      - name: Install Flatpak runtime
        run: |
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install -y flathub org.gnome.Platform//49 org.gnome.Sdk//49
          flatpak install -y flathub org.freedesktop.Sdk.Extension.rust-stable//stable

      - name: Prepare vendor directory
        run: |
          cargo vendor --locked flatpak/vendor \
            | sed 's#directory = ".*flatpak/vendor"#directory = "vendor"#' \
            >flatpak/cargo-config.toml

      - name: Build Flatpak
        run: |
          flatpak-builder \
            --user \
            --force-clean \
            --disable-rofiles-fuse \
            --install-deps-from=flathub \
            -y \
            build-flatpak \
            flatpak/io.github.ashot.App.json

      - name: Create SBOM
        run: |
          echo "$VERSION" > build-flatpak/version.txt
          mkdir -p build-flatpak/repo
          flatpak build-update-repo --title="aShot $VERSION" build-flatpak/repo

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: |
            build-flatpak/io.github.ashot.App.flatpak
            build-flatpak/repo/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}